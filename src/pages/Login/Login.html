<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="LoginPage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Slabo+27px&display=swap" rel="stylesheet">
<link rel="stylesheet" href="@sweetalert2/themes/dark/dark.css">
    <title>Rolling Sneakers</title>
</head>

<body>

    <!-- Boton que despliega el modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#FirstModalButton" id="FirstButton">
        Iniciar Sesion
    </button>

    <!-- Modal -->
    <div class="modal fade" id="FirstModalButton" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="ModalLabel">Iniciar Sesion </h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>


                <div class="modal-body">
                    <h2>Bienvenid@ a ... </h2>
                    <div class="ConteinerInputLogin">
                        <h5>Ingrese su email</h5>
                        <input type="email" name="EmailLogin" id="EmailLogin" placeholder="juan@gmail.com">
                    </div>
                    <div class="ConteinerInputLogin">
                        <h5>Ingrese su contrseña</h5>
                        <input type="password" name="PasswordLogin" id="PasswordLogin" placeholder="******" maxlength="10" minlength="8"> 
                    </div>
                    <div class="ConteinerOptionsLogin">
<div id="ConteinerForgottenPassword">
    <p class="me-2">¿Olvidaste tu contraseña?</p>
    <a href="http://">Recuperar contraseña</a>
</div>

                   
                </div>
            </div>


            <div class="modal-footer">
                <button type="button" id="CloseLoginButton" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="ReadyLoginButton">Listo!</button>
            </div>
        </div>
    </div>
    </div>


    <script src="sweetalert2/dist/sweetalert2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
</body>

</html>
